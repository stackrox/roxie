name: Docker Build and Push

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: quay.io
  IMAGE_NAME: rhacs-eng/roxie

jobs:
  docker-build-push:
    name: Build and Push Multi-arch Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Get build metadata
        id: build-meta
        run: |
          echo "version=$(make version)" >> $GITHUB_OUTPUT
          echo "git_commit=$(make get-commit-hash)" >> $GITHUB_OUTPUT
          echo "build_date=$(make get-build-date)" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with 'latest' for main branch.
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with version string from 'make version'.
            type=raw,value=${{ steps.build-meta.outputs.version }}

      - name: Build and push slim image
        id: docker_build_slim
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}-slim
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build-meta.outputs.version }}
            GIT_COMMIT=${{ steps.build-meta.outputs.git_commit }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
            VARIANT=slim
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=gha,mode=max

      - name: Build and push image
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.build-meta.outputs.version }}
            GIT_COMMIT=${{ steps.build-meta.outputs.git_commit }}
            BUILD_DATE=${{ steps.build-meta.outputs.build_date }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=gha,mode=max

      - name: Images pushed
        run: |
          echo "Images pushed:"
          echo "- ${{ steps.meta.outputs.tags }}-slim:${{ steps.docker_build_slim.outputs.imageid }}"
          echo "- ${{ steps.meta.outputs.tags }}:${{ steps.docker_build.outputs.imageid }}"
